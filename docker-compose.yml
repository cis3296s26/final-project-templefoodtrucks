services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      - POSTGRES_DB=foodtruckDB
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"

    web: 
      build: 
        context: .
        dockerfile: Dockerfile
      volumes:
        - ./backend:/app
      ports:
        - "8080:8080"
      environment:
      - DATABASE_URL=postgresql://user:password@db:5432/foodtruckDB
      depends_on:
        - db